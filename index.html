<body>

  <nav class="site-nav">
    <span class="brand">수택 手澤</span>
    <div class="pages">
      <a href="index.html" class="active">소개</a>
      <a href="exhibition.html">전시</a>
    </div>
  </nav>

  <div class="layout">

    <!-- 좌: 이미지 스크롤 -->
    <div class="col-images">
      <div class="img-block placeholder">이미지 1</div>
      <div class="img-block placeholder">이미지 2</div>
      <div class="img-block placeholder">이미지 3</div>
      <div class="img-block placeholder">이미지 4</div>
      <div class="img-block placeholder">이미지 5</div>
      <div class="img-block placeholder">이미지 6</div>
    </div>

    <!-- 우: 텍스트 고정 -->
    <div class="col-text">

      <div class="text-title">
        <h1>수택</h1>
        <div class="hanja">手澤</div>
      </div>

      <div class="text-body">
        <p>손이 자주 닿은 물건에는 윤기가 스민다.<br>그 윤기를 '수택(手澤)'이라 부른다.</p>
        <p>『수택』은 세 권의 책자로 이루어진 아카이브 북으로, 실크 패키지에 담겨 구성된다.</p>
      </div>

      <div class="text-volumes">
        <div class="vol-item">
          <span class="vol-num">一</span>
          <span>장인들이 오랜 반복 작업을 통해 만들어낸 수택을 기록한다.</span>
        </div>
        <div class="vol-item">
          <span class="vol-num">二</span>
          <span>낡은 인형, 옷 등 애착으로 인해 곁에 두게 된 물건들을 다룬다.</span>
        </div>
        <div class="vol-item">
          <span class="vol-num">三</span>
          <span>일상 속에서 의도치 않게 새겨진 수택을 담은 사진집이다.</span>
        </div>
      </div>

      <div class="text-closing">
        저마다의 방식으로 붙들어온 시간을 들여다본다.
      </div>

    </div>
  </div>
