<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수택 手澤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400&family=Noto+Serif+KR:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="site-nav">
    <span class="brand">수택 手澤</span>
    <div class="pages">
      <a href="index.html" class="active">소개</a>
      <a href="exhibition.html">전시</a>
    </div>
  </nav>

  <div class="layout">

    <!-- 좌: 이미지 스크롤 -->
    <div class="col-images">
      <div class="img-block"><img src="images/s4.jpg.jpg" alt="" /></div>
      <div class="img-block"><img src="images/s5.jpg.jpg" alt="" /></div>
      <div class="img-block"><img src="images/s6.jpg.jpg" alt="" /></div>
      <div class="img-block"><img src="images/s1.jpg.jpg" alt="" /></div>
      <div class="img-block"><img src="images/s2.jpg.jpg" alt="" /></div>
      <div class="img-block"><img src="images/s3.jpg.jpg" alt="" /></div>
    </div>

    <!-- 우: 텍스트 고정 -->
    <div class="col-text">

      <div class="text-title">
        <h1>수택</h1>
        <div class="hanja">手澤</div>
      </div>

      <div class="text-body">
        <p>손이 자주 닿은 물건에는 윤기가 스민다.<br>그 윤기를 '수택(手澤)'이라 부른다.</p>
        <p>『수택』은 세 권의 책자로 이루어진 아카이브 북으로, 실크 패키지에 담겨 구성된다.</p>
      </div>

      <div class="text-volumes">
        <div class="vol-item">
          <span class="vol-num">一</span>
          <span>장인들이 오랜 반복 작업을 통해 만들어낸 수택을 기록한다.</span>
        </div>
        <div class="vol-item">
          <span class="vol-num">二</span>
          <span>낡은 인형, 옷 등 애착으로 인해 곁에 두게 된 물건들을 다룬다.</span>
        </div>
        <div class="vol-item">
          <span class="vol-num">三</span>
          <span>일상 속에서 의도치 않게 새겨진 수택을 담은 사진집이다.</span>
        </div>
      </div>

      <div class="text-closing">
        저마다의 방식으로 붙들어온 시간을 들여다본다.
      </div>

    </div>
  </div>

  <script>
    const prints = [
      `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="60" viewBox="0 0 48 60"><ellipse cx="24" cy="30" rx="10" ry="13" fill="none" stroke="#a89880" stroke-width="1.2"/><ellipse cx="24" cy="30" rx="14" ry="17" fill="none" stroke="#a89880" stroke-width="1"/><ellipse cx="24" cy="30" rx="18" ry="21" fill="none" stroke="#a89880" stroke-width="0.9"/><ellipse cx="24" cy="30" rx="21" ry="25" fill="none" stroke="#a89880" stroke-width="0.8"/><path d="M14 18 Q24 10 34 18" fill="none" stroke="#a89880" stroke-width="0.8"/></svg>`,
      `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="60" viewBox="0 0 48 60"><ellipse cx="24" cy="32" rx="9" ry="12" fill="none" stroke="#a89880" stroke-width="1.2"/><ellipse cx="24" cy="32" rx="13" ry="16" fill="none" stroke="#a89880" stroke-width="1"/><ellipse cx="24" cy="31" rx="17" ry="20" fill="none" stroke="#a89880" stroke-width="0.9"/><ellipse cx="24" cy="30" rx="20" ry="24" fill="none" stroke="#a89880" stroke-width="0.8"/><path d="M16 20 Q24 13 32 20" fill="none" stroke="#a89880" stroke-width="0.8"/><path d="M12 26 Q24 8 36 26" fill="none" stroke="#a89880" stroke-width="0.7"/></svg>`,
      `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="60" viewBox="0 0 48 60"><ellipse cx="24" cy="30" rx="8" ry="11" fill="none" stroke="#a89880" stroke-width="1.2"/><ellipse cx="24" cy="30" rx="12" ry="15" fill="none" stroke="#a89880" stroke-width="1"/><ellipse cx="23" cy="30" rx="16" ry="19" fill="none" stroke="#a89880" stroke-width="0.9"/><ellipse cx="23" cy="29" rx="20" ry="23" fill="none" stroke="#a89880" stroke-width="0.8"/><path d="M15 19 Q24 11 33 19" fill="none" stroke="#a89880" stroke-width="0.8"/></svg>`,
      `<svg xmlns="http://www.w3.org/2000/svg" width="48" height="60" viewBox="0 0 48 60"><ellipse cx="24" cy="31" rx="10" ry="12" fill="none" stroke="#a89880" stroke-width="1.2"/><ellipse cx="24" cy="31" rx="14" ry="16" fill="none" stroke="#a89880" stroke-width="1"/><ellipse cx="24" cy="30" rx="17" ry="20" fill="none" stroke="#a89880" stroke-width="0.9"/><ellipse cx="24" cy="30" rx="21" ry="24" fill="none" stroke="#a89880" stroke-width="0.8"/><path d="M13 22 Q24 12 35 22" fill="none" stroke="#a89880" stroke-width="0.75"/><path d="M11 28 Q24 9 37 28" fill="none" stroke="#a89880" stroke-width="0.65"/></svg>`
    ];

    document.addEventListener('click', function(e) {
      const el = document.createElement('div');
      el.className = 'fingerprint';
      el.innerHTML = prints[Math.floor(Math.random() * prints.length)];
      const rotate = Math.random() * 360;
      el.style.left = (e.pageX) + 'px';
      el.style.top = (e.pageY) + 'px';
      el.style.transform = 'translate(-50%, -50%) rotate(' + rotate + 'deg)';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    });
  </script>
</body>
</html>
